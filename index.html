<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USA vs Portugal Match Preview | March 31, 2026</title>
  <meta name="description" content="Complete match preview for USA vs Portugal international friendly. Lineups, injuries, betting odds, head-to-head history, and prediction.">
  <meta property="og:title" content="USA vs Portugal Match Preview">

  <meta property="og:type" content="website">

  <!-- React from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-broadcast: #0a0a0c;
      --bg-panel: #141418;
      --bg-elevated: #1c1c22;
      --bg-field: #0f3d1f;
      
      --usa-navy: #002868;
      --usa-navy-dark: #001a44;
      --usa-red: #BF0A30;
      --portugal-green: #006600;
      --portugal-green-dark: #004400;
      --portugal-red: #FF0000;
      
      --accent-yellow: #FFD200;
      --accent-yellow-dim: rgba(255, 210, 0, 0.15);
      --accent-live: #FF0033;
      --accent-info: #00A3E0;
      --accent-success: #00C853;
      --accent-warning: #FF9100;
      --accent-danger: #FF1744;
      
      --text-white: #FFFFFF;
      --text-light: #E0E0E0;
      --text-gray: #888888;
      --text-dim: #555555;
      
      --divider: rgba(255,255,255,0.08);
      --divider-strong: rgba(255,255,255,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg-broadcast); }

    .font-score { font-family: 'Bebas Neue', Impact, sans-serif; letter-spacing: 0.02em; line-height: 1; }
    .font-team { font-family: 'Oswald', sans-serif; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .font-body { font-family: 'Inter', system-ui, sans-serif; }
    .font-data { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

    .preview-container { min-height: 100vh; background: var(--bg-broadcast); color: var(--text-white); }

    .top-bar {
      display: flex; align-items: center;
      background: linear-gradient(180deg, #111114 0%, var(--bg-broadcast) 100%);
      border-bottom: 1px solid var(--divider);
      padding: 0 20px; height: 44px; overflow-x: auto;
    }
    .top-bar::-webkit-scrollbar { display: none; }
    .top-bar-item {
      padding: 0 16px; font-size: 11px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap;
      height: 100%; display: flex; align-items: center;
      border-right: 1px solid var(--divider);
    }
    .top-bar-item:last-child { border-right: none; }
    .top-bar-item.highlight { color: var(--text-light); }

    .hero {
      background: linear-gradient(180deg, var(--bg-broadcast) 0%, var(--bg-panel) 100%);
      padding: 40px 20px; text-align: center;
      border-bottom: 2px solid var(--accent-yellow);
    }
    .hero-badge {
      display: inline-block; padding: 6px 16px;
      background: var(--accent-yellow); color: #000;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em; margin-bottom: 24px;
    }
    .hero-teams { display: flex; justify-content: center; align-items: center; gap: 32px; margin-bottom: 24px; }
    .hero-team { text-align: center; }
    .hero-team-block {
      width: 100px; height: 100px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 8px; position: relative; overflow: hidden;
    }
    .hero-team-block::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      pointer-events: none;
    }
    .hero-team-rank { font-size: 13px; color: var(--text-gray); letter-spacing: 0.06em; }
    .hero-vs { font-size: 56px; color: var(--accent-yellow); text-shadow: 0 0 40px rgba(255, 210, 0, 0.3); }
    .hero-info { margin-top: 20px; }
    .hero-date { font-size: 18px; margin-bottom: 4px; }
    .hero-time { font-size: 28px; color: var(--accent-yellow); }
    .hero-venue { font-size: 13px; color: var(--text-gray); margin-top: 8px; }

    .countdown {
      display: flex; justify-content: center; gap: 24px; padding: 20px;
      background: var(--bg-panel); border-bottom: 1px solid var(--divider);
    }
    .countdown-item { text-align: center; }
    .countdown-value { font-size: 36px; color: var(--accent-yellow); line-height: 1; }
    .countdown-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }

    .main { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    .section { margin-bottom: 28px; }
    .section-header {
      display: flex; align-items: center; padding: 10px 14px;
      background: var(--bg-elevated); border-left: 3px solid var(--accent-yellow); margin-bottom: 1px;
    }
    .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-gray); }

    .tabs { display: flex; margin-bottom: 1px; }
    .tab {
      flex: 1; padding: 14px 20px; background: var(--bg-panel); color: var(--text-gray);
      font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      cursor: pointer; border: none; border-bottom: 2px solid transparent;
      transition: all 0.2s ease; text-align: center;
    }
    .tab:hover { background: var(--bg-elevated); color: var(--text-light); }
    .tab.active-usa { background: var(--usa-navy); color: var(--text-white); border-bottom-color: var(--usa-red); }
    .tab.active-por { background: var(--portugal-green); color: var(--text-white); border-bottom-color: var(--portugal-red); }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; }

    .stat-box {
      background: var(--bg-panel); padding: 16px; text-align: center;
      border-left: 3px solid var(--accent-yellow); transition: background 0.2s ease;
    }
    .stat-box:hover { background: var(--bg-elevated); }
    .stat-box-value { font-size: 28px; line-height: 1; margin-bottom: 6px; }
    .stat-box-value.highlight { color: var(--accent-yellow); }
    .stat-box-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }

    .data-panel { background: var(--bg-panel); }
    .data-row {
      display: flex; align-items: center; padding: 12px 14px;
      border-bottom: 1px solid var(--divider); transition: background 0.15s ease;
    }
    .data-row:last-child { border-bottom: none; }
    .data-row:hover { background: rgba(255,255,255,0.02); }
    .data-label { flex: 1; font-size: 13px; color: var(--text-gray); }
    .data-value { font-size: 13px; color: var(--text-light); text-align: right; }
    .data-value.highlight { color: var(--accent-yellow); }
    .data-value.success { color: var(--accent-success); }

    .player-row {
      display: flex; align-items: center; padding: 10px 14px;
      background: var(--bg-panel); border-bottom: 1px solid var(--divider); transition: background 0.15s ease;
    }
    .player-row:last-child { border-bottom: none; }
    .player-row:hover { background: var(--bg-elevated); }
    .player-accent { width: 3px; height: 32px; margin-right: 12px; flex-shrink: 0; }
    .player-number { width: 28px; font-size: 14px; color: var(--text-dim); }
    .player-name { flex: 1; font-size: 13px; }
    .player-pos { width: 36px; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; }
    .player-club { font-size: 11px; color: var(--text-gray); min-width: 120px; text-align: right; }
    .player-status { padding: 3px 8px; font-size: 9px; font-weight: 700; letter-spacing: 0.06em; margin-left: 10px; flex-shrink: 0; }
    .status-doubt { background: var(--accent-warning); color: #000; }
    .status-out { background: var(--accent-danger); color: #fff; }

    .form-container { padding: 14px; background: var(--bg-panel); }
    .form-team-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
    .form-team-row:first-child { border-bottom: 1px solid var(--divider); padding-bottom: 12px; margin-bottom: 4px; }
    .form-team-name { font-size: 13px; }
    .form-results { display: flex; gap: 4px; }
    .form-result { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
    .form-w { background: var(--accent-success); color: #000; }
    .form-d { background: var(--text-gray); color: #000; }
    .form-l { background: var(--accent-danger); color: #fff; }

    .key-player {
      display: flex; background: var(--bg-panel);
      border-bottom: 1px solid var(--divider); transition: background 0.15s ease;
    }
    .key-player:last-child { border-bottom: none; }
    .key-player:hover { background: var(--bg-elevated); }
    .key-player-accent { width: 4px; flex-shrink: 0; }
    .key-player-main { flex: 1; padding: 14px; }
    .key-player-name { font-size: 15px; margin-bottom: 2px; }
    .key-player-meta { font-size: 11px; color: var(--text-gray); margin-bottom: 6px; }
    .key-player-stat { font-size: 12px; color: var(--text-gray); }
    .key-player-stat-value { color: var(--accent-yellow); margin-right: 2px; }
    .key-player-note {
      display: flex; align-items: center; padding: 14px; background: var(--bg-elevated);
      font-size: 11px; color: var(--text-gray); max-width: 180px; line-height: 1.4;
    }

    .odds-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
    .odds-item {
      padding: 18px 12px; text-align: center; background: var(--bg-panel);
      border-right: 1px solid var(--divider); transition: background 0.15s ease;
    }
    .odds-item:last-child { border-right: none; }
    .odds-item:hover { background: var(--bg-elevated); }
    .odds-item.favorite { background: var(--accent-yellow-dim); }
    .odds-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .odds-value { font-size: 22px; margin-bottom: 4px; }
    .odds-value.highlight { color: var(--accent-yellow); }
    .odds-pct { font-size: 11px; color: var(--text-gray); }

    .prediction { background: var(--bg-panel); border: 2px solid var(--accent-yellow); overflow: hidden; }
    .prediction-header {
      padding: 10px 16px; background: var(--accent-yellow); color: #000;
      text-align: center; font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
    }
    .prediction-score { display: flex; justify-content: center; align-items: center; padding: 28px 20px; gap: 28px; }
    .prediction-team { text-align: center; }
    .prediction-team-abbr { font-size: 16px; margin-bottom: 6px; opacity: 0.7; }
    .prediction-team-score { font-size: 72px; }
    .prediction-team-score.winner { color: var(--accent-yellow); }
    .prediction-divider { font-size: 24px; color: var(--text-dim); }
    .prediction-meta {
      padding: 16px; border-top: 1px solid var(--divider);
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; text-align: center;
    }
    .prediction-meta-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .prediction-meta-value { font-size: 14px; }

    .broadcast-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .broadcast-col { background: var(--bg-panel); }
    .broadcast-col:first-child { border-right: 1px solid var(--divider); }
    .broadcast-col-header { padding: 10px 14px; background: var(--bg-elevated); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
    .broadcast-row { display: flex; padding: 10px 14px; border-bottom: 1px solid var(--divider); font-size: 12px; }
    .broadcast-row:last-child { border-bottom: none; }
    .broadcast-label { color: var(--text-gray); width: 70px; }
    .broadcast-value { color: var(--text-light); }

    .footer {
      text-align: center; padding: 32px 16px;
      border-top: 1px solid var(--divider); color: var(--text-dim); font-size: 11px; letter-spacing: 0.06em;
    }
    .footer-logo { font-size: 14px; color: var(--accent-yellow); margin-bottom: 8px; }

    @media (max-width: 768px) {
      .hero-teams { gap: 20px; }
      .hero-team-block { width: 80px; height: 80px; font-size: 26px; }
      .hero-vs { font-size: 40px; }
      .grid-2, .grid-4 { grid-template-columns: 1fr 1fr; }
      .odds-grid { grid-template-columns: 1fr 1fr; }
      .odds-item:nth-child(2) { border-right: none; }
      .odds-item:nth-child(1), .odds-item:nth-child(2) { border-bottom: 1px solid var(--divider); }
      .countdown { gap: 16px; }
      .countdown-value { font-size: 28px; }
      .prediction-meta { grid-template-columns: 1fr; gap: 12px; }
      .broadcast-grid { grid-template-columns: 1fr; }
      .broadcast-col:first-child { border-right: none; border-bottom: 1px solid var(--divider); }
      .key-player-note { display: none; }
      .player-club { display: none; }
      .top-bar { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState } = React;

    // DATA
    const USA = { abbr: 'USA', name: 'United States', color: 'var(--usa-navy)', rank: 15 };
    const POR = { abbr: 'POR', name: 'Portugal', color: 'var(--portugal-green)', rank: 5 };

    const USA_LINEUP = [
      { pos: 'GK', name: 'Freese', club: 'Nottingham Forest' },
      { pos: 'CB', name: 'Freeman', club: 'Arsenal' },
      { pos: 'CB', name: 'Richards', club: 'Crystal Palace', status: 'doubt' },
      { pos: 'CB', name: 'McKenzie', club: 'Genk' },
      { pos: 'RWB', name: 'Weah', club: 'Juventus' },
      { pos: 'CM', name: 'McKennie', club: 'Juventus' },
      { pos: 'CM', name: 'Tessmann', club: 'Lyon' },
      { pos: 'CM', name: 'Pulisic', club: 'AC Milan' },
      { pos: 'LWB', name: 'Robinson', club: 'Fulham' },

    const USA_INJURIES = [
      { name: 'Tyler Adams', status: 'out', reason: 'Quad strain' },

    const POR_INJURIES = [
      { name: 'Cristiano Ronaldo', status: 'out', reason: 'Hamstring' },
      { name: 'Rúben Dias', status: 'out', reason: 'Workload mgmt' },
      { name: 'Bernardo Silva', status: 'out', reason: 'Workload mgmt' },
      { name: 'Diogo Costa', status: 'out', reason: 'Adductor' },
      { name: 'Rafael Leão', status: 'doubt', reason: 'Fitness concern' },
    ];

    const KEY_PLAYERS = {
      usa: [
        { name: 'Christian Pulisic', pos: 'MF', club: 'AC Milan', stats: '8G, 3A', note: '14 games without a goal' },
        { name: 'Folarin Balogun', pos: 'FW', club: 'Monaco', stats: '9G, 4A', note: 'Feb Player of the Month' },
        { name: 'Weston McKennie', pos: 'MF', club: 'Juventus', stats: '4 UCL G', note: 'Scored vs POR in 2017' },
        { name: 'Antonee Robinson', pos: 'DF', club: 'Fulham', stats: '150+ PL', note: 'First cap in 495 days' },
      ],
      por: [
        { name: 'Bruno Fernandes', pos: 'MF', club: 'Man United', stats: '8G, 16A', note: 'Captain' },
        { name: 'João Félix', pos: 'FW', club: 'Al-Nassr', stats: '15G, 11A', note: '' },
        { name: 'Gonçalo Ramos', pos: 'FW', club: 'PSG', stats: '8G Ligue 1', note: 'Starting striker' },
        { name: 'Francisco Conceição', pos: 'FW', club: 'Juventus', stats: 'UCL star', note: '' },
      ]
    };

    // COMPONENTS
    const FormResult = ({ result }) => (
      <div className={`form-result font-data form-${result.toLowerCase()}`}>{result}</div>
    );

    const PlayerRow = ({ player, teamColor, number }) => (
      <div className="player-row">
        <div className="player-accent" style={{ background: teamColor }} />
        <div className="player-number font-data">{number}</div>
        <div className="player-name font-team">{player.name}</div>
        <div className="player-pos font-body">{player.pos}</div>
        <div className="player-club font-body">{player.club}</div>
        {player.status && (
          <span className={`player-status status-${player.status}`}>{player.status.toUpperCase()}</span>
        )}
      </div>
    );

    const InjuryRow = ({ player, teamColor }) => (
      <div className="player-row">
        <div className="player-accent" style={{ background: teamColor }} />
        <div className="player-name font-team" style={{ flex: 1 }}>{player.name}</div>
        <div className="player-club font-body" style={{ minWidth: 'auto' }}>{player.reason}</div>
        <span className={`player-status status-${player.status}`}>{player.status.toUpperCase()}</span>

    );

    const KeyPlayerCard = ({ player, teamColor }) => (
      <div className="key-player">
        <div className="key-player-accent" style={{ background: teamColor }} />
        <div className="key-player-main">
          <div className="key-player-name font-team">{player.name}</div>
          <div className="key-player-meta font-body">{player.pos} • {player.club}</div>
          <div className="key-player-stat font-body">
            <span className="key-player-stat-value font-data">{player.stats}</span> season
          </div>
        </div>
        {player.note && <div className="key-player-note font-body">{player.note}</div>}
      </div>
    );

    // MAIN
    function MatchPreview() {
      const [activeLineup, setActiveLineup] = useState('usa');
      const [activeInjuries, setActiveInjuries] = useState('usa');
      const [activeKeyPlayers, setActiveKeyPlayers] = useState('usa');

      const currentLineup = activeLineup === 'usa' ? USA_LINEUP : POR_LINEUP;
      const currentTeam = activeLineup === 'usa' ? USA : POR;
      const currentInjuries = activeInjuries === 'usa' ? USA_INJURIES : POR_INJURIES;
      const currentInjuryTeam = activeInjuries === 'usa' ? USA : POR;
      const currentKeyPlayers = activeKeyPlayers === 'usa' ? KEY_PLAYERS.usa : KEY_PLAYERS.por;
      const currentKeyTeam = activeKeyPlayers === 'usa' ? USA : POR;

      return (
        <div className="preview-container font-body">
          {/* TOP BAR */}
          <div className="top-bar">
            <div className="top-bar-item highlight">International Friendly</div>
            <div className="top-bar-item">Pre-World Cup</div>
            <div className="top-bar-item">Tue, March 31, 2026</div>
            <div className="top-bar-item">7:00 PM ET</div>
            <div className="top-bar-item">Mercedes-Benz Stadium</div>
            <div className="top-bar-item" style={{ marginLeft: 'auto', borderRight: 'none', borderLeft: '1px solid var(--divider)' }}>
              TNT • HBO Max • Peacock • Telemundo
            </div>
          </div>

          {/* HERO */}
          <div className="hero">
            <div className="hero-badge font-team">International Friendly</div>
            <div className="hero-teams">
              <div className="hero-team">
                <div className="hero-team-block font-team" style={{ background: USA.color }}>{USA.abbr}</div>
                <div className="hero-team-rank font-data">#{USA.rank} FIFA</div>
              </div>
              <div className="hero-vs font-score">VS</div>
              <div className="hero-team">
                <div className="hero-team-block font-team" style={{ background: POR.color }}>{POR.abbr}</div>
                <div className="hero-team-rank font-data">#{POR.rank} FIFA</div>
              </div>
            </div>
            <div className="hero-info">
              <div className="hero-date font-team">Tuesday, March 31, 2026</div>
              <div className="hero-time font-data">7:00 PM ET</div>
              <div className="hero-venue font-body">Mercedes-Benz Stadium, Atlanta, GA</div>
            </div>
          </div>

          {/* COUNTDOWN */}
          <div className="countdown">
            <div className="countdown-item">
              <div className="countdown-value font-score">73</div>
              <div className="countdown-label font-body">Days to World Cup</div>
            </div>
            <div className="countdown-item">
              <div className="countdown-value font-score" style={{ color: 'var(--text-white)' }}>56</div>
              <div className="countdown-label font-body">Days to Roster</div>
            </div>
            <div className="countdown-item">
              <div className="countdown-value font-score" style={{ color: 'var(--text-white)' }}>2</div>
              <div className="countdown-label font-body">Final Auditions</div>
            </div>
          </div>

          {/* MAIN CONTENT */}
          <div className="main">

            {/* QUICK STATS */}
            <div className="section">
              <div className="grid-4">
                <div className="stat-box">
                  <div className="stat-box-value font-data highlight">73</div>
                  <div className="stat-box-label font-body">Days to WC</div>
                </div>
                <div className="stat-box">
                  <div className="stat-box-value font-data">2-3-2</div>
                  <div className="stat-box-label font-body">All-Time H2H</div>
                </div>
                <div className="stat-box">
                  <div className="stat-box-value font-data">1-1</div>
                  <div className="stat-box-label font-body">Last Meeting</div>
                </div>
                <div className="stat-box">
                  <div className="stat-box-value font-data" style={{ color: 'var(--accent-success)' }}>3</div>
                  <div className="stat-box-label font-body">POR Winless</div>
                </div>
              </div>
            </div>

            {/* MATCH CONTEXT */}
            <div className="section">
              <div className="section-header">
                <span className="section-title font-body">Match Context</span>
              </div>
              <div className="data-panel">
                <div className="data-row">
                  <span className="data-label font-body">World Cup Countdown</span>
                  <span className="data-value highlight font-data">73 days — USA opens June 12 vs Paraguay</span>
                </div>
                <div className="data-row">
                  <span className="data-label font-body">Roster Announcement</span>
                  <span className="data-value font-data">May 26, 2026</span>
                </div>
                <div className="data-row">
                  <span className="data-label font-body">USA Last Result</span>
                  <span className="data-value font-data" style={{ color: 'var(--accent-danger)' }}>L 2-5 vs Belgium (Mar 28)</span>
                </div>
                <div className="data-row">
                  <span className="data-label font-body">Portugal Last Result</span>
                  <span className="data-value font-data">D 0-0 vs Mexico (Mar 28)</span>
                </div>
              </div>
            </div>

            {/* FORM GUIDE */}
            <div className="section">
              <div className="section-header">
                <span className="section-title font-body">Form Guide — Last 5</span>
              </div>
              <div className="form-container">
                <div className="form-team-row">
                  <span className="form-team-name font-team" style={{ color: USA.color }}>USA</span>
                  <div className="form-results">
                    {['L', 'W', 'W', 'W', 'D'].map((r, i) => <FormResult key={i} result={r} />)}
                  </div>
                </div>
                <div className="form-team-row">
                  <span className="form-team-name font-team" style={{ color: POR.color }}>Portugal</span>
                  <div className="form-results">
                    {['D', 'W', 'L', 'D', 'W'].map((r, i) => <FormResult key={i} result={r} />)}
                  </div>
                </div>
              </div>
            </div>

            {/* PROJECTED LINEUPS */}
            <div className="section">
              <div className="section-header">
                <span className="section-title font-body">Projected Lineups</span>
              </div>
              <div className="tabs">
                <button 
                  className={`tab font-team ${activeLineup === 'usa' ? 'active-usa' : ''}`}
                  onClick={() => setActiveLineup('usa')}
                >
                  USA 3-5-2
                </button>
                <button 
                  className={`tab font-team ${activeLineup === 'por' ? 'active-por' : ''}`}
                  onClick={() => setActiveLineup('por')}
                >
                  Portugal 4-3-3
                </button>
              </div>
              <div>
                {currentLineup.map((player, i) => (
                  <PlayerRow key={i} player={player} teamColor={currentTeam.color} number={i + 1} />
                ))}
              </div>
            </div>

            {/* KEY PLAYERS */}
            <div className="section">
              <div className="section-header">
                <span className="section-title font-body">Key Players to Watch</span>
              </div>
              <div className="tabs">
                <button 
                  className={`tab font-team ${activeKeyPlayers === 'usa' ? 'active-usa' : ''}`}
                  onClick={() => setActiveKeyPlayers('usa')}
                >
                  USA
                </button>
                <button 
                  className={`tab font-team ${activeKeyPlayers === 'por' ? 'active-por' : ''}`}
                  onClick={() => setActiveKeyPlayers('por')}
                >
                  Portugal
                </button>
              </div>
              <div>
                {currentKeyPlayers.map((player, i) => (
                  <KeyPlayerCard key={i} player={player} teamColor={currentKeyTeam.color} />
                ))}
              </div>
            </div>

            {/* INJURIES */}
            <div className="section">
              <div className="section-header">
                <span className="section-title font-body">Injuries & Availability</span>
              </div>
              <div className="tabs">
                <button 
                  className={`tab font-team ${activeInjuries === 'usa' ? 'active-usa' : ''}`}
                  onClick={() => setActiveInjuries('usa')}
                >
                  USA ({USA_INJURIES.length})
                </button>
                <button 
                  className={`tab font-team ${activeInjuries === 'por' ? 'active-por' : ''}`}
                  onClick={() => setActiveInjuries('por')}
                >
                  Portugal ({POR_INJURIES.length})
                </button>
              </div>
              <div>
                {currentInjuries.map((player, i) => (
                  <InjuryRow key={i} player={player} teamColor={currentInjuryTeam.color} />
                ))}
              </div>
            </div>

            {/* HEAD TO HEAD */}
            <div className="section">
              <div className="section-header">
                <span className="section-title font-body">Head-to-Head History</span>
              </div>
              <div className="data-panel">
                <div className="data-row">
                  <span className="data-label font-body">All-Time Record</span>
                  <span className="data-value font-data">USA 2W – 3D – 2L (7 matches)</span>
                </div>
                <div className="data-row">
                  <span className="data-label font-body">Last 3 Meetings</span>
                  <span className="data-value success font-data">USA 1W – 2D – 0L</span>
                </div>
                <div className="data-row">
                  <span className="data-label font-body">Nov 14, 2017</span>
                  <span className="data-value font-body">USA 1–1 Portugal — McKennie debut goal</span>
                </div>
                <div className="data-row">
                  <span className="data-label font-body">Jun 22, 2014 (WC)</span>
                  <span className="data-value font-body">USA 2–2 Portugal — Varela 95' equalizer</span>
                </div>
                <div className="data-row">
                  <span className="data-label font-body">Jun 5, 2002 (WC)</span>
                  <span className="data-value highlight font-body">USA 3–2 Portugal — Iconic upset</span>
                </div>
              </div>
            </div>

            {/* BETTING ODDS */}
            <div className="section">
              <div className="section-header">
                <span className="section-title font-body">Betting Lines</span>
              </div>
              <div className="odds-grid">
                <div className="odds-item">
                  <div className="odds-label font-body">USA Win</div>
                  <div className="odds-value font-data">+350</div>
                  <div className="odds-pct font-body">22%</div>
                </div>
                <div className="odds-item">
                  <div className="odds-label font-body">Draw</div>
                  <div className="odds-value font-data">+390</div>
                  <div className="odds-pct font-body">24%</div>
                </div>
                <div className="odds-item favorite">
                  <div className="odds-label font-body">Portugal Win</div>
                  <div className="odds-value highlight font-data">-139</div>
                  <div className="odds-pct font-body">56%</div>
                </div>
                <div className="odds-item">
                  <div className="odds-label font-body">Over 2.5</div>
                  <div className="odds-value font-data">-140</div>
                  <div className="odds-pct font-body">59%</div>
                </div>
              </div>
            </div>

            {/* PREDICTION */}
            <div className="section">
              <div className="prediction">
                <div className="prediction-header font-team">Prediction</div>
                <div className="prediction-score">
                  <div className="prediction-team">
                    <div className="prediction-team-abbr font-team" style={{ color: USA.color }}>USA</div>
                    <div className="prediction-team-score font-score">1</div>
                  </div>
                  <div className="prediction-divider font-body">—</div>
                  <div className="prediction-team">
                    <div className="prediction-team-abbr font-team" style={{ color: POR.color }}>POR</div>
                    <div className="prediction-team-score font-score winner">2</div>
                  </div>
                </div>
                <div className="prediction-meta">
                  <div className="prediction-meta-item">
                    <div className="prediction-meta-label font-body">Confidence</div>
                    <div className="prediction-meta-value font-data">65%</div>
                  </div>
                  <div className="prediction-meta-item">
                    <div className="prediction-meta-label font-body">First Goalscorer</div>
                    <div className="prediction-meta-value font-data">Bruno Fernandes</div>
                  </div>
                  <div className="prediction-meta-item">
                    <div className="prediction-meta-label font-body">USA Scorer</div>
                    <div className="prediction-meta-value font-data">F. Balogun</div>
                  </div>
                </div>
              </div>
            </div>

            {/* HOW TO WATCH */}
            <div className="section">
              <div className="section-header">
                <span className="section-title font-body">How to Watch</span>
              </div>
              <div className="broadcast-grid">
                <div className="broadcast-col">
                  <div className="broadcast-col-header font-body">English</div>
                  <div className="broadcast-row">
                    <span className="broadcast-label font-body">TV</span>
                    <span className="broadcast-value font-data">TNT, truTV</span>
                  </div>
                  <div className="broadcast-row">
                    <span className="broadcast-label font-body">Stream</span>
                    <span className="broadcast-value font-data">HBO Max, Peacock</span>
                  </div>
                  <div className="broadcast-row">
                    <span className="broadcast-label font-body">Radio</span>
                    <span className="broadcast-value font-data">Westwood One</span>
                  </div>
                </div>
                <div className="broadcast-col">
                  <div className="broadcast-col-header font-body">Spanish</div>
                  <div className="broadcast-row">
                    <span className="broadcast-label font-body">TV</span>
                    <span className="broadcast-value font-data">Telemundo, Universo</span>
                  </div>
                  <div className="broadcast-row">
                    <span className="broadcast-label font-body">Stream</span>
                    <span className="broadcast-value font-data">Peacock</span>
                  </div>
                  <div className="broadcast-row">
                    <span className="broadcast-label font-body">Radio</span>
                    <span className="broadcast-value font-data">Fútbol de Primera</span>
                  </div>
                </div>
              </div>
            </div>

          </div>

          {/* FOOTER */}
          <div className="footer font-body">
            <div className="footer-logo font-score">MATCH PREVIEW</div>
            <div>USA vs Portugal • March 31, 2026 • Atlanta, GA</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MatchPreview />);
  </script>
</body>
</html>
